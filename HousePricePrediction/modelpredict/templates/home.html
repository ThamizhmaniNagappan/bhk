<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI House Price Predictor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:
    linear-gradient(
    135deg,
    #0f172a,
    #1e3a8a,
    #312e81);
    overflow-x:hidden;
}

.hero{
    padding-top:60px;
}

.glass-card{
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.1);
    border-radius:30px;
    box-shadow:
    0 8px 32px rgba(0,0,0,.3);
}

.title{
    font-size:3rem;
    font-weight:800;
    color:white;
}

.subtitle{
    color:#cbd5e1;
    font-size:1.1rem;
}

.form-control{
    height:60px;
    border-radius:15px;
    background:rgba(255,255,255,.12);
    border:none;
    color:white;
}

.form-control:focus{
    background:rgba(255,255,255,.15);
    color:white;
    box-shadow:none;
}

.form-control::placeholder{
    color:#cbd5e1;
}

.form-label{
    color:white;
    font-weight:600;
}

.predict-btn{
    height:60px;
    border:none;
    border-radius:15px;
    font-size:18px;
    font-weight:700;
    background:
    linear-gradient(
    90deg,
    #06b6d4,
    #3b82f6);
}

.predict-btn:hover{
    transform:translateY(-2px);
}

.result-card{
    margin-top:30px;
    background:white;
    border-radius:25px;
    padding:30px;
    text-align:center;
}

.price{
    font-size:3rem;
    font-weight:800;
    color:#10b981;
}

.floating{
    position:absolute;
    width:250px;
    height:250px;
    border-radius:50%;
    filter:blur(100px);
}

.one{
    background:#06b6d4;
    top:50px;
    left:50px;
}

.two{
    background:#8b5cf6;
    bottom:50px;
    right:50px;
}

.house-icon{
    font-size:80px;
    color:#60a5fa;
}

.feature-box{
    text-align:center;
    color:white;
}

.feature-box i{
    font-size:35px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="floating one"></div>
<div class="floating two"></div>

<div class="container hero">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="glass-card p-5">

<div class="text-center mb-5">

<i class="fas fa-house house-icon"></i>

<h1 class="title">
AI House Price Predictor
</h1>

<p class="subtitle">
Powered by Machine Learning & Django
</p>

</div>

<form method="POST">

{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-4">
<label class="form-label">
Location
</label>

<input type="text"
class="form-control"
name="location"
placeholder="Enter Location">
</div>

<div class="col-md-6 mb-4">
<label class="form-label">
Total Sqft
</label>

<input type="number"
class="form-control"
name="total_sqft"
placeholder="2850">
</div>

<div class="col-md-6 mb-4">
<label class="form-label">
Bathrooms
</label>

<input type="number"
class="form-control"
name="bath"
placeholder="4">
</div>

<div class="col-md-6 mb-4">
<label class="form-label">
BHK
</label>

<input type="number"
class="form-control"
name="bhk"
placeholder="4">
</div>

</div>

<button class="btn predict-btn w-100">
<i class="fas fa-chart-line"></i>
 Predict House Price
</button>

</form>

{% if prediction %}

<div class="result-card">

<h5>Predicted Property Value</h5>

<div class="price">
₹ {{ prediction }} Lakhs
</div>

<p class="text-muted">
AI Estimated Market Price
</p>

</div>

{% endif %}

</div>

</div>

</div>

<div class="row mt-5 text-center">

<div class="col-md-4">
<div class="feature-box">
<i class="fas fa-brain"></i>
<h5>Machine Learning</h5>
</div>
</div>

<div class="col-md-4">
<div class="feature-box">
<i class="fas fa-location-dot"></i>
<h5>Location Analysis</h5>
</div>
</div>

<div class="col-md-4">
<div class="feature-box">
<i class="fas fa-chart-column"></i>
<h5>Market Prediction</h5>
</div>
</div>

</div>

</div>

</body>
</html>
